<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pobieranie — Czarny Zeszyt</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        color-scheme: dark;
        background: hsl(0 0% 2%);
        color: hsl(0 0% 96%);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(90vw, 420px);
        text-align: center;
      }

      p {
        color: hsl(0 0% 96% / 0.62);
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        margin-top: 18px;
        padding: 0 22px;
        border: 1px solid hsl(0 0% 96% / 0.18);
        border-radius: 999px;
        color: hsl(0 0% 96%);
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>15 brutalnych zasad budowania dochodowego studia</h1>
      <p id="status">Przygotowuję pobieranie. Jeśli nie rozpocznie się automatycznie, użyj przycisku poniżej.</p>
      <a id="download" href="/ebook/15-brutalnych-zasad-budowania-dochodowego-studia.pdf" download="15-brutalnych-zasad-budowania-dochodowego-studia.pdf">Pobierz PDF</a>
    </main>
    <script>
      const pdfUrl = "/ebook/15-brutalnych-zasad-budowania-dochodowego-studia.pdf";
      const fileName = "15-brutalnych-zasad-budowania-dochodowego-studia.pdf";

      async function startDownload() {
        const status = document.getElementById("status");

        try {
          const response = await fetch(pdfUrl, { cache: "no-store" });
          if (!response.ok) throw new Error("PDF unavailable");

          const blob = await response.blob();
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = fileName;
          document.body.appendChild(link);
          link.click();
          link.remove();
          setTimeout(() => URL.revokeObjectURL(url), 1500);
          if (status) status.textContent = "Pobieranie zostało uruchomione.";
        } catch {
          if (status) status.textContent = "Kliknij przycisk poniżej, aby pobrać PDF.";
        }
      }

      document.getElementById("download")?.addEventListener("click", (event) => {
        event.preventDefault();
        startDownload();
      });

      window.addEventListener("DOMContentLoaded", startDownload);
    </script>
  </body>
</html>
