<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pobieranie — Czarny Zeszyt</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        color-scheme: dark;
        background: #050505;
        color: #f5f5f5;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(90vw, 420px);
        text-align: center;
      }

      p {
        color: rgb(245 245 245 / 0.62);
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        margin-top: 18px;
        padding: 0 22px;
        border: 1px solid rgb(245 245 245 / 0.18);
        border-radius: 999px;
        color: #f5f5f5;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Czarny Zeszyt</h1>
      <p>Pobieranie powinno rozpocząć się automatycznie. Jeśli nie, użyj przycisku poniżej.</p>
      <a id="download" href="/ebook/czarny-zeszyt.pdf" download="Czarny-Zeszyt.pdf">Pobierz PDF</a>
    </main>
    <script>
      window.addEventListener("DOMContentLoaded", () => {
        document.getElementById("download")?.click();
      });
    </script>
  </body>
</html>
